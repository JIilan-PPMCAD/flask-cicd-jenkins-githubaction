name: Python Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - stage
    tags:
      - 'v*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install flask pytest mongomock flask-pymongo python-dotenv certifi
          fi
          pip install mongomock

      - name: Run Pytest Suite
        run: |
          pytest test_app.py

  deploy-staging:
    name: Deploy to Staging Environment
    needs: build-and-test
    if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH Private Key File
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Execute Remote Deployment Script Over SSH
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.STAGING_SERVER_IP }} << 'EOF'
            mkdir -p /home/ubuntu/staging-app
            cd /home/ubuntu/staging-app
            
            rm -rf .git * || true
            
           # FIXED: Inserted your precise repository clone URL path
            git clone https://github.com/JIilan-PPMCAD/flask-cicd-jenkins-githubaction.git .
            git checkout stage
            
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt || pip install flask pytest mongomock flask-pymongo python-dotenv certifi
            pip install mongomock
            
            fuser -k 8000/tcp || true
            export FLASK_ENV=staging
            nohup python3 app.py > flask_app.log 2>&1 &
            sleep 5
            
            curl -f http://localhost:8000
          EOF

      # =========================================================================
      # STEP 1: DOWNLOAD FLASK LOG FILE FROM EC2 TO RUNNER
      # =========================================================================
      - name: Download Runtime Log File from EC2 Server
        if: always() # Ensures logs are grabbed even if the deployment steps crash
        run: |
          scp -i ~/.ssh/id_rsa ubuntu@${{ secrets.STAGING_SERVER_IP }}:/home/ubuntu/staging-app/flask_app.log ./flask_app.log || echo "Log file not found on server" > ./flask_app.log

      # =========================================================================
      # STEP 2: SEND EMAIL NOTIFICATION WITH ATTACHMENT
      # =========================================================================
      - name: Send Email Notification via Zoho Mail
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.zoho.in
          server_port: 465
          secure: true
          username: jilanshaik20@zohomail.in
          password: ${{ secrets.ZOHO_MAIL_PASSWORD }}
          subject: "GitHub Actions: Staging Deployment Status is ${{ job.status }}!"
          to: jilanshaik20@zohomail.in
          from: GitHub Actions Pipeline <jilanshaik20@zohomail.in>
          # FIXED: Attaches the pulled server log file directly to your email
          attachments: ./flask_app.log
          body: |
            Hello,
            
            The GitHub Actions deployment pipeline job has completed execution for STAGING.
            
            - Repository: ${{ github.repository }}
            - Branch/Ref: ${{ github.ref_name }}
            - Execution Status: ${{ job.status }}
            
            The runtime application diagnostic log (flask_app.log) has been attached to this email.
            
            Review full workflow logs directly here: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
