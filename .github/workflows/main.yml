name: Python Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - stage
    tags:
      - 'v*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install flask pytest mongomock flask-pymongo python-dotenv certifi
          fi
          pip install mongomock

      - name: Run Pytest Suite
        run: |
          pytest test_app.py

  deploy-staging:
    name: Deploy to Staging Environment
    needs: build-and-test
    if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH Private Key File
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.STAGING_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Execute Remote Deployment Script Over SSH
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.STAGING_SERVER_IP }} << 'EOF'
            mkdir -p /home/ubuntu/staging-app
            cd /home/ubuntu/staging-app
            
            rm -rf .git * || true
            
            # FIXED: Inserted your precise repository clone URL path
            git clone https://github.com/JIilan-PPMCAD/flask-cicd-jenkins-githubaction.git .
            git checkout stage
            
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt || pip install flask pytest mongomock flask-pymongo python-dotenv certifi
            pip install mongomock
            
            fuser -k 8000/tcp || true
            export FLASK_ENV=staging
            nohup python3 app.py > flask_app.log 2>&1 &
            sleep 5
            
            curl -f http://localhost:8000
          EOF
