name: Python Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
      - stage
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - stage

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install flask pytest mongomock flask-pymongo python-dotenv certifi
          fi
          pip install mongomock

      - name: Run Pytest Suite
        run: |
          pytest test_app.py

  deploy-staging:
    name: Deploy to Staging Environment
    needs: build-and-test
    if: github.ref == 'refs/heads/stage' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Staging Instance via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/ubuntu/staging-app
            cd /home/ubuntu/staging-app
            
            rm -rf .git * || true
            git clone https://github.com .
            git checkout stage
            
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt || pip install flask pytest mongomock flask-pymongo python-dotenv certifi
            pip install mongomock
            
            fuser -k 8000/tcp || true
            export FLASK_ENV=staging
            nohup python3 app.py > flask_app.log 2>&1 &
            sleep 5
            
            curl -f http://localhost:8000

  deploy-production:
    name: Deploy to Production Environment
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Production Instance via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/ubuntu/production-app
            cd /home/ubuntu/production-app
            
            rm -rf .git * || true
            git clone https://github.com .
            git checkout ${{ github.ref_name }}
            
            python3 -m venv venv
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt || pip install flask pytest mongomock flask-pymongo python-dotenv certifi
            pip install mongomock
            
            fuser -k 8000/tcp || true
            export FLASK_ENV=production
            nohup python3 app.py > flask_prod_app.log 2>&1 &
            sleep 5
            curl -f http://localhost:8000
